<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>수능특강 영어 분석기</title>
        <style>
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Thin.woff2") format("woff2"); font-weight:100; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-ExtraLight.woff2") format("woff2"); font-weight:200; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Light.woff2") format("woff2"); font-weight:300; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Medium.woff2") format("woff2"); font-weight:500; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-SemiBold.woff2") format("woff2"); font-weight:600; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Bold.woff2") format("woff2"); font-weight:700; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-ExtraBold.woff2") format("woff2"); font-weight:800; font-display:swap; }

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --font: "Interop", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
                --bg: #f4f4f2;
                --surface: #ffffff;
                --border: #e4e4df;
                --border-soft: #eeeeea;
                --text: #18181b;
                --text-2: #52525b;
                --text-3: #a1a1aa;
                --accent: #1d4ed8;
                --accent-h: #1e40af;
                --y-bg: #fefce8; --y-bd: #eab308;
                --o-bg: #fff7ed; --o-bd: #f97316;
                --p-bg: #f5f3ff; --p-bd: #8b5cf6; --p-text: #6d28d9;
                --v-bg: #eff6ff; --v-bd: #93c5fd; --v-text: #1d4ed8;
                --gray-bg: #f4f4f2; --gray-bd: #d1d5db;
                --sb-w: 272px;
            }

            html { font-size: 16px; }

            body {
                display: flex;
                height: 100vh;
                overflow: hidden;
                font-family: var(--font);
                color: var(--text);
                background: var(--bg);
                -webkit-font-smoothing: antialiased;
            }

            /* ══════════════════════════════════════
               SIDEBAR
            ══════════════════════════════════════ */
            .sidebar {
                width: var(--sb-w);
                flex-shrink: 0;
                height: 100vh;
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .sb-logo {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 20px 18px 16px;
                border-bottom: 1px solid var(--border-soft);
                flex-shrink: 0;
            }
            .sb-logo-text {
                font-size: 14px;
                font-weight: 700;
                letter-spacing: -0.2px;
            }
            .sb-logo-text em { font-style: normal; color: var(--accent); }

            .sb-form {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 14px 14px 12px;
                overflow: hidden;
            }

            .sb-label {
                display: block;
                font-size: 10px;
                font-weight: 600;
                color: var(--text-3);
                letter-spacing: 0.5px;
                text-transform: uppercase;
                margin-bottom: 4px;
            }

            .sb-input {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 7px;
                background: var(--bg);
                padding: 7px 10px;
                font-family: var(--font);
                font-size: 13px;
                color: var(--text);
                outline: none;
                transition: border-color 0.15s, background 0.15s;
            }
            .sb-input:focus { border-color: var(--accent); background: #fff; }
            .sb-input::placeholder { color: var(--text-3); }

            .sb-meta-row {
                display: flex;
                gap: 8px;
            }
            .sb-meta-row .sb-field { flex: 1; }

            .sb-field { display: flex; flex-direction: column; }

            .sb-ta-wrap {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .sb-ta {
                flex: 1;
                min-height: 160px;
                resize: none;
                border: 1px solid var(--border);
                border-radius: 7px;
                background: var(--bg);
                padding: 10px 12px;
                font-family: var(--font);
                font-size: 13px;
                line-height: 1.55;
                color: var(--text);
                outline: none;
                transition: border-color 0.15s, background 0.15s;
            }
            .sb-ta:focus { border-color: var(--accent); background: #fff; }
            .sb-ta::placeholder { color: var(--text-3); font-size: 12px; }

            .sb-hint {
                font-size: 11px;
                color: var(--text-3);
                line-height: 1.5;
                margin-top: 4px;
            }
            .sb-hint strong { color: var(--text-2); }

            .sb-btn {
                width: 100%;
                height: 40px;
                border: none;
                border-radius: 8px;
                background: var(--accent);
                color: #fff;
                font-family: var(--font);
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
                flex-shrink: 0;
            }
            .sb-btn:hover { background: var(--accent-h); box-shadow: 0 3px 12px rgba(29,78,216,0.25); transform: translateY(-1px); }
            .sb-btn:active { transform: translateY(0); }
            .sb-btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }

            .sb-footer {
                border-top: 1px solid var(--border-soft);
                padding: 10px 14px 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                flex-shrink: 0;
            }

            .sb-footer-row {
                display: flex;
                gap: 6px;
            }

            .sb-ghost {
                flex: 1;
                height: 34px;
                border: 1px solid var(--border);
                border-radius: 7px;
                background: #fff;
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                color: var(--text-2);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                transition: border-color 0.15s, background 0.15s;
            }
            .sb-ghost:hover { border-color: var(--text-2); background: var(--bg); }

            .sb-stat {
                font-size: 11px;
                color: var(--text-3);
                text-align: center;
                min-height: 14px;
            }

            /* ══════════════════════════════════════
               MAIN CONTENT
            ══════════════════════════════════════ */
            .main {
                flex: 1;
                overflow-y: auto;
                background: var(--bg);
            }

            /* ── EMPTY ── */
            .empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 60px 32px;
                color: var(--text-3);
                text-align: center;
            }
            .empty-icon { font-size: 48px; margin-bottom: 20px; }
            .empty-title { font-size: 20px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
            .empty-desc { font-size: 14px; line-height: 1.7; max-width: 320px; }

            /* ── A4 OUTER ── */
            .a4-outer { display: none; padding: 36px 28px 80px; }

            /* ══════════════════════════════════════
               A4 DOCUMENT
            ══════════════════════════════════════ */
            .a4 {
                width: 210mm;
                min-height: 297mm;
                background: #fff;
                margin: 0 auto;
                padding: 14mm 11mm 16mm 16mm;
                box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 8px 32px rgba(0,0,0,0.09);
                border-radius: 3px;
            }
            .a4 + .a4 { margin-top: 28px; border-top: 2px dashed var(--border); padding-top: 28px; }

            /* PAGE HEADER */
            .ph {
                border-bottom: 2px solid var(--text);
                padding-bottom: 3.5mm;
                margin-bottom: 4.5mm;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
            .ph-title { font-size: 18pt; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
            .ph-sub { font-size: 8pt; color: var(--text-2); margin-top: 2px; font-weight: 400; }
            .ph-right { font-size: 7.5pt; color: var(--text-3); text-align: right; line-height: 1.8; }

            /* LEGEND */
            .legend {
                display: flex; gap: 12px; flex-wrap: wrap;
                margin-bottom: 4.5mm; padding: 2.5mm 4mm;
                background: #fafaf8; border: 1px solid var(--border-soft); border-radius: 5px;
            }
            .li { display: flex; align-items: center; gap: 5px; font-size: 7pt; color: var(--text-2); }
            .lchip { height: 11px; border-radius: 2px; flex-shrink: 0; }
            .lvchip {
                background: var(--v-bg); border: 1px solid var(--v-bd); color: var(--v-text);
                font-size: 7pt; font-weight: 700; padding: 0 4px;
                border-radius: 3px; line-height: 16px; height: 16px;
                display: inline-flex; align-items: center;
            }

            /* PAGE BODY GRID */
            .pb { display: grid; grid-template-columns: 1fr 44mm; gap: 7mm; }

            /* SENTENCES */
            .sb { margin-bottom: 3.5mm; }
            .sr { display: flex; gap: 5px; align-items: baseline; }
            .sn {
                font-size: 7pt; color: var(--text-3); font-weight: 600;
                flex-shrink: 0; width: 14px; padding-top: 1px;
                font-variant-numeric: tabular-nums; line-height: 1.88;
            }
            .sw { flex: 1; }
            .tx {
                font-size: 11pt; line-height: 1.88; color: var(--text);
                font-weight: 400; letter-spacing: 0.01em;
                text-align: justify; overflow-wrap: break-word; word-break: normal;
            }

            /* RUBY */
            ruby { ruby-align: center; }
            rt {
                font-size: 6pt; font-weight: 700; color: var(--v-text);
                white-space: nowrap; letter-spacing: 0; line-height: 1;
            }
            ruby.vt { color: var(--v-text); font-weight: 600; }

            /* HIGHLIGHTS */
            .hl-y { background: var(--y-bg); padding: 1px 3px; border-radius: 2px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
            .hl-p { background: var(--p-bg); padding: 1px 3px; border-radius: 2px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
            .hl-o-block { display: block; background: var(--o-bg); border-left: 3px solid var(--o-bd); padding: 3px 7px 3px 8px; border-radius: 0 4px 4px 0; margin-bottom: 1px; }
            .vt { color: var(--v-text); font-weight: 600; }
            .vn {
                display: inline-block; font-size: 6.5pt; font-weight: 700;
                color: var(--v-text); background: var(--v-bg); border: 1px solid var(--v-bd);
                border-radius: 3px; padding: 0 2.5px; margin-left: 1.5px;
                vertical-align: super; line-height: 1.25; cursor: pointer;
                transition: background 0.12s, color 0.12s; white-space: nowrap; user-select: none;
            }
            .vn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
            .gt { color: var(--p-text); font-weight: 600; border-bottom: 2px solid #c4b5fd; }

            /* GRAMMAR CHIPS */
            .gc-row { display: flex; flex-direction: column; gap: 2px; margin-top: 3px; }
            .gc {
                font-size: 7.5pt; color: #1e1b4b; background: var(--p-bg);
                border: 1px solid #ddd6fe; border-left: 3px solid var(--p-bd);
                border-radius: 0 3px 3px 0; padding: 2px 8px;
                font-weight: 400; line-height: 1.65;
            }
            .gc-lbl { color: var(--p-text); font-weight: 800; }

            /* TRANSLATION */
            .tr { font-size: 9pt; color: var(--text-2); margin-top: 2px; line-height: 1.65; font-weight: 300; letter-spacing: -0.1px; }

            /* MARGIN NOTES */
            .mn { font-size: 7.5pt; line-height: 1.6; padding: 4px 7px; border-radius: 4px; margin-bottom: 3mm; font-weight: 400; }
            .mn-y { background: var(--y-bg); border-left: 2.5px solid var(--y-bd); color: #713f12; }
            .mn-o { background: var(--o-bg); border-left: 2.5px solid var(--o-bd); color: #7c2d12; }
            .mn-p { background: var(--p-bg); border-left: 2.5px solid var(--p-bd); color: #4c1d95; }
            .mn-d { background: var(--gray-bg); border-left: 2.5px solid var(--gray-bd); color: var(--text-2); }
            .mn-ref { font-size: 6.5pt; font-weight: 700; opacity: 0.6; display: block; margin-bottom: 2px; }

            /* BOTTOM SECTION */
            .bottom-section { display: grid; grid-template-columns: 1fr 72mm; gap: 6mm; margin-top: 5mm; }
            .bottom-left { display: flex; flex-direction: column; gap: 4mm; }

            /* LOGIC FLOW */
            .logic-box { background: var(--gray-bg); border: 1px solid var(--gray-bd); border-radius: 7px; padding: 4mm 5mm 5mm; }
            .logic-box-title { font-size: 7.5pt; font-weight: 800; color: var(--text-3); letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 3mm; }
            .lf-chain { display: flex; flex-direction: column; gap: 0; }
            .lf-step { display: flex; align-items: baseline; gap: 6px; padding: 1.5px 0; }
            .lf-badge { font-size: 7pt; font-weight: 800; white-space: nowrap; flex-shrink: 0; padding: 1px 5px; border-radius: 3px; line-height: 1.6; }
            .lf-badge.premise  { color: #374151; background: #f3f4f6; }
            .lf-badge.claim    { color: #1d4ed8; background: #eff6ff; }
            .lf-badge.problem  { color: #92400e; background: #fffbeb; }
            .lf-badge.counter  { color: #5b21b6; background: #f5f3ff; }
            .lf-badge.evidence { color: #065f46; background: #ecfdf5; }
            .lf-badge.concession { color: #9f1239; background: #fff1f2; }
            .lf-badge.conclusion { color: #1e40af; background: #dbeafe; }
            .lf-badge.example  { color: #0e7490; background: #ecfeff; }
            .lf-badge.expansion { color: #52525b; background: #f4f4f5; }
            .lf-summary { font-size: 8pt; color: var(--text); line-height: 1.6; word-break: keep-all; }
            .lf-sids { font-size: 6.5pt; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }
            .lf-arrow { font-size: 7.5pt; color: var(--text-3); padding-left: 6px; line-height: 1.4; }
            .lf-claim { margin-top: 2.5mm; padding-top: 2.5mm; border-top: 1px solid var(--border-soft); font-size: 8pt; font-weight: 700; color: var(--text-2); }

            /* VOCAB TABLE */
            .vs { grid-column: 1 / -1; margin-top: 6mm; border-top: 1.5px solid var(--border); padding-top: 4mm; }
            .vs-ttl { font-size: 8pt; font-weight: 800; color: var(--text-2); letter-spacing: 0.8px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 3mm; }
            .vs-ttl::after { content: ""; flex: 1; height: 1px; background: var(--border-soft); }
            .vt-table { width: 100%; border-collapse: collapse; }
            .vt-table th { font-size: 7pt; font-weight: 600; color: var(--text-3); text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border); letter-spacing: 0.3px; text-transform: uppercase; background: #fafaf8; }
            .vt-table td { font-size: 8pt; padding: 4px 6px; vertical-align: top; border-bottom: 1px solid var(--border-soft); line-height: 1.55; }
            .vt-table tr:last-child td { border-bottom: none; }
            .vt-table tr:hover td { background: #f8fbff; }
            .vt-n { color: var(--v-text); font-weight: 800; font-size: 7.5pt; width: 20px; text-align: center; }
            .vt-w { font-weight: 700; color: var(--v-text); width: 120px; }
            .vt-p { color: var(--text-3); font-size: 7pt; font-style: italic; white-space: nowrap; width: 60px; }
            .vt-m { color: var(--text); }
            .vt-c { color: #ea580c; font-size: 7.5pt; font-weight: 600; width: 160px; }

            /* EXAM BOX */
            .exam-box { background: #f0fdf4; border: 1px solid #86efac; border-left: 4px solid #22c55e; border-radius: 7px; padding: 4mm 5mm 5mm; }
            .exam-box-header { font-size: 7.5pt; font-weight: 800; color: #166534; letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 3mm; }
            .exam-items { display: flex; flex-direction: column; gap: 2mm; }
            .exam-item { display: flex; gap: 7px; align-items: baseline; }
            .exam-badge { font-size: 6.5pt; font-weight: 800; color: #fff; background: #16a34a; border-radius: 3px; padding: 1px 6px; white-space: nowrap; flex-shrink: 0; line-height: 1.7; }
            .exam-point { font-size: 8pt; color: #14532d; line-height: 1.6; }
            .exam-sids { font-size: 6.5pt; color: #4ade80; font-weight: 700; margin-left: 4px; }

            /* BACKGROUND NOTE BOX */
            .bg-box { background: #f0f9ff; border: 1px solid #bae6fd; border-left: 4px solid #0ea5e9; border-radius: 7px; padding: 4mm 5mm 5mm; }
            .bg-box-header { font-size: 7pt; font-weight: 800; color: #0369a1; letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 2mm; }
            .bg-box-title { font-size: 9pt; font-weight: 700; color: #0c4a6e; margin-bottom: 1.5mm; }
            .bg-box-body { font-size: 8pt; color: #0c4a6e; line-height: 1.7; word-break: keep-all; }
            .bg-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2.5mm; }
            .bg-tag { font-size: 6.5pt; font-weight: 600; color: #0369a1; background: #e0f2fe; border-radius: 3px; padding: 1px 6px; }

            /* TYPE MARKER */
            .tm { display: inline-flex; align-items: center; font-size: 7pt; font-weight: 800; border-radius: 3px; padding: 0 5px; line-height: 1.7; flex-shrink: 0; margin-right: 3px; white-space: nowrap; }
            .tm-insert { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
            .tm-x     { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
            .tm-order { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
            .tm-topic { background: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd; }
            .tm-gram  { background: #f5f3ff; color: #6d28d9; border: 1px solid #c4b5fd; }
            .tm-gen   { background: #f4f4f5; color: #52525b; border: 1px solid #d4d4d8; }

            /* RE-ANALYZE BUTTON */
            .re-btn { font-size: 7pt; border: 1px solid var(--border); border-radius: 4px; background: #fff; color: var(--text-2); cursor: pointer; padding: 2px 8px; font-family: var(--font); font-weight: 500; transition: background 0.15s, border-color 0.15s; }
            .re-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }

            /* Q&A BOX */
            .qa-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 7px; padding: 4mm 5mm 5mm; display: flex; flex-direction: column; }
            .qa-header { font-size: 7.5pt; font-weight: 800; color: var(--text-3); letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 3mm; }
            .qa-list { display: flex; flex-direction: column; gap: 4mm; flex: 1; }
            .qa-item { border-left: 3px solid var(--accent); padding-left: 7px; }
            .qa-q { font-size: 7.5pt; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
            .qa-a { font-size: 8.5pt; color: var(--text); line-height: 1.65; white-space: pre-wrap; }
            .qa-loading { color: var(--text-3); font-style: italic; }

            /* LOADING / ERROR */
            .load { padding: 60px 0; text-align: center; color: var(--text-3); }
            .spin { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp 0.75s linear infinite; margin: 0 auto 12px; }
            @keyframes sp { to { transform: rotate(360deg); } }
            .load-txt { font-size: 13px; }
            .err { background: #fff1f2; border: 1px solid #fecdd3; border-radius: 6px; padding: 14px 18px; color: #9f1239; font-size: 13px; line-height: 1.6; }

            /* ── PRINT ── */
            @media print {
                body { display: block; height: auto; overflow: visible; background: #fff; }
                .sidebar { display: none !important; }
                .main { overflow: visible; }
                .a4-outer { display: block !important; padding: 0; }
                .a4 { box-shadow: none; width: 100%; min-height: auto; border-radius: 0; padding: 12mm 10mm; }
                .a4 + .a4 { page-break-before: always; border-top: none; padding-top: 0; margin-top: 0; }
                .vn { background: var(--v-bg) !important; color: var(--v-text) !important; border-color: var(--v-bd) !important; }
                .vt-table tr:hover td { background: transparent; }
                .lf-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                @page { size: A4; margin: 0; }
            }

            /* ══════════════════════════════════════
               HISTORY MODAL
            ══════════════════════════════════════ */
            .modal-overlay {
                position: fixed; inset: 0; z-index: 1000;
                background: rgba(0,0,0,0.45);
                display: flex; align-items: center; justify-content: center;
                opacity: 0; pointer-events: none; transition: opacity 0.2s;
            }
            .modal-overlay.open { opacity: 1; pointer-events: auto; }
            .modal {
                background: #fff; border-radius: 12px;
                width: min(620px, 92vw); max-height: 76vh;
                display: flex; flex-direction: column;
                box-shadow: 0 20px 60px rgba(0,0,0,0.22); overflow: hidden;
            }
            .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
            .modal-title { font-size: 15px; font-weight: 700; }
            .modal-close { width: 30px; height: 30px; border: none; background: none; cursor: pointer; border-radius: 6px; font-size: 20px; line-height: 1; color: var(--text-3); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
            .modal-close:hover { background: var(--bg); color: var(--text); }
            .modal-search { padding: 12px 20px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
            .modal-search input { width: 100%; border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; font-family: var(--font); font-size: 13px; outline: none; background: var(--bg); transition: border-color 0.15s; }
            .modal-search input:focus { border-color: var(--accent); background: #fff; }
            .modal-list { flex: 1; overflow-y: auto; padding: 6px 0; }
            .modal-row { display: flex; align-items: center; padding: 11px 20px; gap: 10px; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border-soft); }
            .modal-row:last-child { border-bottom: none; }
            .modal-row:hover { background: #f0f6ff; }
            .modal-row-book { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .modal-row-badge { font-size: 10.5px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 8px; flex-shrink: 0; }
            .modal-row-meta { font-size: 11.5px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }
            .modal-row-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
            .modal-row:hover .modal-row-actions { opacity: 1; }
            .mra-btn { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 5px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-3); transition: all 0.15s; flex-shrink: 0; }
            .mra-btn:hover { background: var(--bg); color: var(--text); }
            .mra-btn.del:hover { background: #fff1f2; border-color: #fca5a5; color: #dc2626; }
            .modal-row.editing { background: #f8fafc; cursor: default; flex-wrap: wrap; gap: 6px; padding: 10px 16px; }
            .modal-row.editing:hover { background: #f8fafc; }
            .mre-inputs { display: flex; gap: 6px; flex: 1; min-width: 0; }
            .mre-input { border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-family: var(--font); font-size: 12px; outline: none; background: #fff; transition: border-color 0.15s; }
            .mre-input:focus { border-color: var(--accent); }
            .mre-book { flex: 1; min-width: 80px; }
            .mre-sm { width: 52px; }
            .mre-actions { display: flex; gap: 4px; }
            .mre-save { height: 28px; padding: 0 12px; border: none; border-radius: 5px; background: var(--accent); color: #fff; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; }
            .mre-cancel { height: 28px; padding: 0 10px; border: 1px solid var(--border); border-radius: 5px; background: #fff; color: var(--text-2); font-family: var(--font); font-size: 12px; cursor: pointer; }
            .modal-empty { padding: 52px 20px; text-align: center; color: var(--text-3); font-size: 13px; }
            .modal-footer { padding: 10px 20px; border-top: 1px solid var(--border-soft); display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
            .modal-count { font-size: 12px; color: var(--text-3); }
            .cache-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; color: #059669; background: #d1fae5; border-radius: 4px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }

            @media print { .modal-overlay { display: none !important; } }
        </style>
    </head>
    <body>
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sb-logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
                </svg>
                <span class="sb-logo-text">수능특강&nbsp;<em>영어 분석기</em></span>
            </div>

            <div class="sb-form">
                <div class="sb-field">
                    <label class="sb-label">교재명</label>
                    <input class="sb-input" id="mBook" placeholder="수능특강 영어" />
                </div>
                <div class="sb-meta-row">
                    <div class="sb-field">
                        <label class="sb-label">쪽수</label>
                        <input class="sb-input" id="mPage" placeholder="42" />
                    </div>
                    <div class="sb-field">
                        <label class="sb-label">문항</label>
                        <input class="sb-input" id="mNum" placeholder="18" />
                    </div>
                </div>
                <div class="sb-field">
                    <label class="sb-label">문제 유형</label>
                    <select class="sb-input" id="mType">
                        <option value="">— 일반 분석 —</option>
                        <option value="빈칸">빈칸 추론</option>
                        <option value="주제요지제목">주제·요지·제목</option>
                        <option value="문장삽입">문장 삽입</option>
                        <option value="무관문장">무관한 문장</option>
                        <option value="단락순서">단락 순서</option>
                        <option value="어법">어법</option>
                        <option value="어휘">어휘</option>
                        <option value="함의추론">함의 추론</option>
                        <option value="요약문">요약문 완성</option>
                    </select>
                </div>
                <div class="sb-ta-wrap">
                    <label class="sb-label">지문</label>
                    <textarea
                        class="sb-ta"
                        id="inputText"
                        placeholder="지문을 붙여넣으세요&#10;Ctrl+Enter 로 분석 시작"
                    ></textarea>
                </div>
                <div class="sb-hint">
                    <strong>(지시사항)</strong> 첫 줄에 입력 시 해당 방식으로 분석<br />
                    <strong>#질문</strong> 형식으로 Q&amp;A
                </div>
                <button class="sb-btn" id="analyzeBtn" onclick="run()">분석하기 →</button>
            </div>

            <div class="sb-footer">
                <div class="sb-footer-row">
                    <button class="sb-ghost" id="historyBtn" onclick="openHistory()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        저장 목록
                    </button>
                    <button class="sb-ghost" id="printBtn" style="display:none" onclick="window.print()">🖨 PDF</button>
                </div>
                <div class="sb-stat" id="stat"></div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <div class="empty" id="emptyState">
                <div class="empty-icon">📖</div>
                <div class="empty-title">지문을 입력해주세요</div>
                <div class="empty-desc">
                    수능특강·수능완성 지문을 붙여넣으면<br />직독직해 · 어휘 · 문법 · 논리흐름을 자동으로 분석합니다
                </div>
            </div>
            <div class="a4-outer" id="a4outer"></div>
        </main>

        <!-- HISTORY MODAL -->
        <div class="modal-overlay" id="historyOverlay" onclick="closeHistory(event)">
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title">저장된 분석 목록</span>
                    <button class="modal-close" onclick="closeHistory()">&#215;</button>
                </div>
                <div class="modal-search">
                    <input id="historySearch" placeholder="교재명, 쪽수, 번호로 검색…" oninput="filterHistory()" />
                </div>
                <div class="modal-list" id="historyList">
                    <div class="modal-empty">불러오는 중…</div>
                </div>
                <div class="modal-footer">
                    <span class="modal-count" id="historyCount"></span>
                </div>
            </div>
        </div>

        <script>
            /* ════════════════════════════════════════════
   DB — /api/db 를 통해 Neon PostgreSQL 연동
════════════════════════════════════════════ */
            async function dbCall(payload) {
                const res = await fetch("/api/db", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { throw new Error("DB 응답 오류 (HTML 수신) — DATABASE_URL이 .env에 있는지 확인하세요."); }
                if (data && data.error) throw new Error(data.error);
                return data;
            }

            async function checkCache(book, page, num) {
                if (!num) return null;
                try {
                    return await dbCall({ action: "check", book, page: page || "", num });
                } catch { return null; }
            }

            async function saveToCache(book, page, num, passage, result) {
                if (!num) return;
                try {
                    await dbCall({ action: "upsert", book, page: page || "", num, passage, result });
                } catch (e) { console.warn("캐시 저장 실패:", e.message); }
            }

            /* ── HISTORY MODAL ── */
            let _historyAll = [];

            async function openHistory() {
                document.getElementById("historyOverlay").classList.add("open");
                document.getElementById("historySearch").value = "";
                document.getElementById("historyList").innerHTML = '<div class="modal-empty">불러오는 중…</div>';
                try {
                    _historyAll = await dbCall({ action: "list" });
                    renderHistoryList(_historyAll);
                } catch (e) {
                    document.getElementById("historyList").innerHTML =
                        '<div class="modal-empty">오류: ' + E(e.message) + '</div>';
                }
            }

            function closeHistory(e) {
                if (e && e.target !== document.getElementById("historyOverlay")) return;
                document.getElementById("historyOverlay").classList.remove("open");
            }

            function filterHistory() {
                const q = document.getElementById("historySearch").value.toLowerCase();
                renderHistoryList(!q ? _historyAll : _historyAll.filter(r =>
                    (r.book || "").toLowerCase().includes(q) ||
                    (r.page || "").includes(q) ||
                    (r.num || "").includes(q)
                ));
            }

            function renderHistoryList(rows) {
                document.getElementById("historyCount").textContent = rows.length + "건";
                const el = document.getElementById("historyList");
                if (!rows.length) {
                    el.innerHTML = '<div class="modal-empty">저장된 분석이 없습니다</div>';
                    return;
                }
                el.innerHTML = rows.map(r => {
                    const date = new Date(r.created_at).toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
                    const badge = [r.page ? "p." + r.page : "", r.num ? r.num + "번" : ""].filter(Boolean).join(" · ");
                    return `<div class="modal-row" id="mrow-${r.id}" onclick="loadCachedById('${r.id}')">
                        <span class="modal-row-book">${E(r.book || "—")}</span>
                        ${badge ? `<span class="modal-row-badge">${E(badge)}</span>` : ""}
                        <span class="modal-row-meta">${date}</span>
                        <span class="modal-row-actions" onclick="event.stopPropagation()">
                            <button class="mra-btn" title="이름 수정" onclick="startEditRow('${r.id}','${E(r.book||"")}','${E(r.page||"")}','${E(r.num||"")}')">✎</button>
                            <button class="mra-btn del" title="삭제" onclick="deleteAnalysis('${r.id}')">✕</button>
                        </span>
                    </div>`;
                }).join("");
            }

            async function deleteAnalysis(id) {
                if (!confirm("이 분석을 삭제하시겠습니까?")) return;
                try {
                    await dbCall({ action: "delete", id });
                    _historyAll = _historyAll.filter(r => r.id !== id);
                    renderHistoryList(_historyAll);
                } catch (e) { alert("삭제 실패: " + e.message); }
            }

            function startEditRow(id, book, page, num) {
                const row = document.getElementById("mrow-" + id);
                if (!row) return;
                row.classList.add("editing");
                row.onclick = null;
                row.innerHTML = `
                    <div class="mre-inputs">
                        <input class="mre-input mre-book" value="${E(book)}" placeholder="교재명" id="mre-book-${id}">
                        <input class="mre-input mre-sm" value="${E(page)}" placeholder="쪽" id="mre-page-${id}">
                        <input class="mre-input mre-sm" value="${E(num)}" placeholder="번호" id="mre-num-${id}">
                    </div>
                    <div class="mre-actions">
                        <button class="mre-save" onclick="saveEditRow('${id}')">저장</button>
                        <button class="mre-cancel" onclick="cancelEditRow('${id}')">취소</button>
                    </div>`;
                document.getElementById("mre-book-" + id).focus();
            }

            function cancelEditRow(id) {
                renderHistoryList(_historyAll);
            }

            async function saveEditRow(id) {
                const book = document.getElementById("mre-book-" + id).value.trim();
                const page = document.getElementById("mre-page-" + id).value.trim();
                const num  = document.getElementById("mre-num-" + id).value.trim();
                if (!book) { alert("교재명을 입력하세요."); return; }
                try {
                    await dbCall({ action: "update", id, book, page, num });
                    const r = _historyAll.find(r => r.id === id);
                    if (r) { r.book = book; r.page = page; r.num = num; }
                    renderHistoryList(_historyAll);
                } catch (e) { alert("수정 실패: " + e.message); }
            }

            async function loadCachedById(id) {
                document.getElementById("historyOverlay").classList.remove("open");
                try {
                    const data = await dbCall({ action: "get", id });
                    if (!data) { alert("불러오기 실패"); return; }
                    document.getElementById("mBook").value = data.book || "";
                    document.getElementById("mPage").value = data.page || "";
                    document.getElementById("mNum").value = data.num || "";
                    await loadFromCache(data);
                } catch (e) { alert("불러오기 실패: " + e.message); }
            }

            async function loadFromCache(cached) {
                const btn = document.getElementById("analyzeBtn");
                const stat = document.getElementById("stat");
                const pBtn = document.getElementById("printBtn");
                const book = cached.book || "";
                const pageRaw = cached.page || "";
                const numRaw = cached.num || "";
                const parts = [];
                if (pageRaw) parts.push("p. " + pageRaw);
                if (numRaw) parts.push(numRaw + "번");
                const dateStr = new Date(cached.created_at || Date.now()).toLocaleDateString("ko-KR", {
                    year: "numeric", month: "long", day: "numeric"
                });

                btn.disabled = true; btn.textContent = "불러오는 중…";
                document.getElementById("emptyState").style.display = "none";
                document.getElementById("a4outer").style.display = "block";
                stat.textContent = "";

                const block = document.createElement("div");
                block.className = "a4";
                block.innerHTML =
                    `<div class="ph">
                        <div>
                            <div class="ph-title">${E(book)}</div>
                            <div class="ph-sub">${E(parts.join("  ·  "))}<span class="cache-badge">⚡ 저장됨</span></div>
                        </div>
                        <div class="ph-right">${E(dateStr)}<br><button class="re-btn" onclick="reAnalyze(this)">↺ 재분석</button></div>
                    </div>` + LEGEND_HTML +
                    `<div class="pb">
                        <div class="main-text"></div>
                        <div class="margin-col"></div>
                    </div>
                    <div class="bottom-section">
                        <div class="bottom-left">
                            <div class="logic-box" style="display:none">
                                <div class="logic-box-title">논리 흐름</div>
                                <div class="lf-chain"></div>
                                <div class="lf-claim"></div>
                            </div>
                            <div class="bg-box" style="display:none">
                                <div class="bg-box-header">배경 지식</div>
                                <div class="bg-box-title"></div>
                                <div class="bg-box-body"></div>
                                <div class="bg-tags"></div>
                            </div>
                            <div class="exam-box" style="display:none">
                                <div class="exam-box-header">내신 출제 유형</div>
                                <div class="exam-items"></div>
                            </div>
                        </div>
                        <div class="qa-box" style="display:none">
                            <div class="qa-header">Q &amp; A</div>
                            <div class="qa-list"></div>
                        </div>
                    </div>`;
                document.getElementById("a4outer").appendChild(block);
                block.dataset.passage = cached.passage || "";
                if (cached.id) block.dataset.cachedId = cached.id;
                block.scrollIntoView({ behavior: "smooth", block: "start" });

                const mainEl = block.querySelector(".main-text");
                const mColEl = block.querySelector(".margin-col");
                const lbox = block.querySelector(".logic-box");
                const examBox = block.querySelector(".exam-box");
                const bgBox = block.querySelector(".bg-box");
                render(cached.result, mainEl, mColEl, examBox, lbox, stat, pBtn, bgBox);

                btn.disabled = false; btn.textContent = "분석하기 →";
                document.getElementById("inputText").value = "";
            }

            async function reAnalyze(btn) {
                const block = btn.closest(".a4");
                const passage = block.dataset.passage;
                if (!passage) return;

                // DB에서 기존 항목 삭제
                const cachedId = block.dataset.cachedId;
                if (cachedId) {
                    try { await dbCall({ action: "delete", id: cachedId }); } catch {}
                }

                // 기존 블록 제거
                block.remove();

                const qType = document.getElementById("mType").value;
                await runAnalysis(passage, null, qType);
            }

            /* ════════════════════════════════════════════
   STEP TYPE CONFIG
════════════════════════════════════════════ */
            const STEP_TYPES = {
                premise: { label: "통념/배경", color: "#9CA3AF" },
                claim: { label: "주장", color: "#3B82F6" },
                problem: { label: "문제 제기", color: "#F59E0B" },
                counter: { label: "반박/전환", color: "#8B5CF6" },
                evidence: { label: "근거/사례", color: "#10B981" },
                concession: { label: "양보", color: "#F43F5E" },
                conclusion: { label: "결론", color: "#1D4ED8" },
                example: { label: "예시", color: "#06B6D4" },
                expansion: { label: "부연", color: "#9CA3AF" },
            };

            /* ════════════════════════════════════════════
   QUESTION TYPE INSTRUCTIONS
════════════════════════════════════════════ */
            const TYPE_INSTRUCTIONS = {
                "빈칸": `빈칸 추론 유형.
JSON 출력 규칙:
- 빈칸이 들어갈 핵심 문장 1개: typeMarker:"[빈칸]" + highlight:"yellow" + comment:"빈칸 정답 근거 (20자 이내)"
- coreClaim: 선택지로 출제 가능한 수준으로 정밀하게`,

                "주제요지제목": `주제·요지·제목 유형.
JSON 출력 규칙:
- 주제문/결론 문장 1개: typeMarker:"[주제]" + highlight:"yellow"
- coreClaim: 선택지 수준으로 정밀하게 (명사구 형태)`,

                "문장삽입": `문장 삽입 유형. 상세 지시는 user 메시지 참조.`,

                "무관문장": `무관한 문장 유형.
JSON 출력 규칙:
- 주제와 관련 없는 문장 1개: typeMarker:"[X]" + highlight:"orange" + comment:"무관 근거: [이유 20자]"
- 주제문 1개: typeMarker:"[주제]" + highlight:"yellow"
- 나머지 문장 comment: null
- logicFlow: 각 단계에서 [X] 문장 제외 후 흐름이 자연스러운지 설명`,

                "단락순서": `단락 순서 유형. 상세 지시는 user 메시지 참조.`,

                "어법": `어법 유형.
JSON 출력 규칙:
- 어법 출제 포인트 문장 1–2개: typeMarker:"[어법]" + highlight:"purple"
- grammar 항목: 문장당 2–4개 필수. note를 30자 이내로 상세하게 (오답 선택지 근거 포함)`,

                "어휘": `어휘 유형.
JSON 출력 규칙:
- 다의어·문맥 의미 혼동 출제 후보 문장: typeMarker:"[어휘]" + highlight:"yellow"
- 모든 vocab 항목에 contextMeaning 필수 입력
- 해당 문장 comment: "혼동 유의어/반의어: [단어] (20자)"`,

                "함의추론": `함의 추론 유형.
JSON 출력 규칙:
- 필자 태도·함의가 가장 강한 문장: typeMarker:"[함의]" + highlight:"yellow"
- 해당 문장 comment: "함의: 표면 의미 vs 실제 의미 (20자)"
- coreClaim: 표면 이면의 논리·함의 포함`,

                "요약문": `요약문 완성 유형.

            async function readAnthropicStream(res) {
                if (!res.ok) {
                    const t = await res.text();
                    try { const e = JSON.parse(t); throw new Error(e.error?.message || `API 오류 ${res.status}`); }
                    catch (e) { if (e.message !== "Unexpected token") throw e; throw new Error(`서버 오류 (${res.status})`); }
                }
                const ct = res.headers.get("content-type") || "";
                if (!ct.includes("event-stream")) {
                    const json = await res.json();
                    if (json.error) throw new Error(json.error.message);
                    return (json.content?.find(b => b.type === "text") || {}).text || "";
                }
                const reader = res.body.getReader();
                const dec = new TextDecoder();
                let text = "", buf = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split("\n");
                    buf = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const d = line.slice(6).trim();
                        if (d === "[DONE]") break;
                        try {
                            const ev = JSON.parse(d);
                            if (ev.type === "content_block_delta" && ev.delta?.type === "text_delta") text += ev.delta.text;
                            else if (ev.type === "error") throw new Error(ev.error?.message || "스트리밍 오류");
                        } catch (e) { if (e.message !== "Unexpected token" && !e.message.startsWith("JSON")) throw e; }
                    }
                }
                return text;
            }

                    [/\}(\s*)\[/g, "},$1["],
                ];
                for (let i = 0; i < 30; i++) {
                    const prev = s;
                    patterns.forEach(([re, rep]) => { s = s.replace(re, rep); });
                    s = s.replace(/,(\s*[}\]])/g, "$1");
                    if (s === prev) break;
                }
                for (let i = 0; i < 10; i++) {
                    try { return JSON.parse(s); } catch (e) {
                        const pos = parseInt((e.message.match(/position (\d+)/) || [])[1]);
                        if (!pos || pos <= 0 || pos >= s.length) break;
                        s = s.slice(0, pos) + "," + s.slice(pos);
                    }
                }
                return JSON.parse(s);
            }

            /* ════════════════════════════════════════════
   MAIN
════════════════════════════════════════════ */
            async function run() {
                const raw = document.getElementById("inputText").value.trim();
                if (!raw) { alert("지문을 입력해주세요."); return; }

                // (요청사항) 첫 줄에서 지시사항 추출
                let instruction = null;
                let body = raw;
                const instrMatch = raw.match(/^\(([^)]+)\)\s*\n/);
                if (instrMatch) {
                    instruction = instrMatch[1].trim();
                    body = raw.slice(instrMatch[0].length).trim();
                }

                // # 으로 시작하는 줄이 있으면 Q&A 모드
                const lines = body.split("\n");
                const hashIdx = lines.findIndex((l) => l.trimStart().startsWith("#"));
                if (hashIdx !== -1) {
                    const question = lines.slice(hashIdx).join("\n").trimStart().slice(1).trim();
                    const inlinePassage = lines.slice(0, hashIdx).join("\n").trim();
                    await runQA(question, inlinePassage);
                } else {
                    const book = document.getElementById("mBook").value.trim() || "수능특강 영어";
                    const page = document.getElementById("mPage").value.trim().replace(/[^0-9\-]/g, "");
                    const num  = document.getElementById("mNum").value.trim().replace(/[^0-9\-]/g, "");
                    if (num) {
                        const cached = await checkCache(book, page, num);
                        if (cached) { await loadFromCache(cached); return; }
                    }
                    const qType = document.getElementById("mType").value;
                    await runAnalysis(body, instruction, qType);
                }
            }

            async function runQA(question, inlinePassage) {
                if (!question) return;

                if (inlinePassage) {
                    const qType = document.getElementById("mType").value;
                    await runAnalysis(inlinePassage, null, qType);
                }

                let blocks = document.querySelectorAll("#a4outer .a4");
                if (!blocks.length) {
                    alert("먼저 지문을 분석해주세요.");
                    return;
                }

                const btn = document.getElementById("analyzeBtn");
                btn.disabled = true;
                btn.textContent = "답변 중…";

                const lastBlock = blocks[blocks.length - 1];
                const passage = lastBlock.dataset.passage || inlinePassage || "";
                const qaBox = lastBlock.querySelector(".qa-box");
                const qaList = qaBox ? qaBox.querySelector(".qa-list") : null;

                const qLabel = question.length > 40 ? question.slice(0, 38) + "…" : question;

                let item = null;
                try {
                    if (!qaBox || !qaList) throw new Error("Q&A 박스를 찾을 수 없습니다. 지문을 다시 분석해주세요.");
                    qaBox.style.display = "block";

                    item = document.createElement("div");
                    item.className = "qa-item";
                    item.innerHTML =
                        '<div class="qa-q">Q. ' + E(qLabel) + "</div>" +
                        '<div class="qa-a qa-loading">답변 중…</div>';
                    qaList.appendChild(item);
                    item.scrollIntoView({ behavior: "smooth", block: "end" });

                    const res = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1536,
                            stream: true,
                            system: `수능·내신 영어 해설서 스타일로 답변하라. AI 어투("~입니다", "~해요") 금지. 아래 형식을 반드시 지켜라.

【요약】답변 핵심을 20자 이내 한 줄로 작성 (이 줄이 제목으로 사용됨)

【핵심 개념】
질문과 관련된 문법·어휘·논리 개념을 1–3줄로 정의한다.

【지문 분석】
해당 문장 또는 구문을 인용하고, 구조를 단계별로 풀어 설명한다.

【정리】
학생이 헷갈리는 포인트를 짚어 간결하게 마무리한다. 필요하면 유사 예문 1개 추가.

규칙: 소제목은 그대로 유지. 【요약】은 첫 줄에만. 각 항목은 짧고 명확하게. 구어체·AI 어투 절대 금지.`,
                            messages: [{ role: "user", content: "[지문]\n" + passage + "\n\n[질문]\n" + question }],
                        }),
                    });
                    const answer = (await readAnthropicStream(res)) || "답변 없음";
                    const sumMatch = answer.match(/^【요약】(.+)/m);
                    const displayLabel = sumMatch ? sumMatch[1].trim() : qLabel;
                    const bodyText = sumMatch ? answer.replace(/^【요약】[^\n]*\n?/, "").trim() : answer;
                    item.querySelector(".qa-q").textContent = "▶ " + displayLabel;
                    item.querySelector(".qa-a").textContent = bodyText;
                    item.querySelector(".qa-a").classList.remove("qa-loading");
                } catch (e) {
                    if (item) {
                        item.querySelector(".qa-a").textContent = "오류: " + e.message;
                        item.querySelector(".qa-a").classList.remove("qa-loading");
                    } else {
                        alert("오류: " + e.message);
                    }
                } finally {
                    btn.disabled = false;
                    btn.textContent = "분석하기 →";
                    document.getElementById("inputText").value = "";
                }
            }

            async function runAnalysis(text, instruction, qType) {
                const btn = document.getElementById("analyzeBtn");
                const stat = document.getElementById("stat");
                const pBtn = document.getElementById("printBtn");

                btn.disabled = true;
                btn.textContent = "분석 중…";
                stat.textContent = "";
                document.getElementById("emptyState").style.display = "none";
                document.getElementById("a4outer").style.display = "block";

                const book = document.getElementById("mBook").value.trim() || "수능특강 영어";
                const pageRaw = document.getElementById("mPage").value.trim().replace(/[^0-9\-]/g, "");
                const numRaw  = document.getElementById("mNum").value.trim().replace(/[^0-9\-]/g, "");
                const parts = [];
                if (pageRaw) parts.push("p. " + pageRaw);
                if (numRaw) parts.push(numRaw + "번");
                const dateStr = new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric" });

                const typeHtml = qType
                    ? ` &nbsp;<span style="font-size:7pt;padding:1px 6px;border-radius:3px;background:var(--v-bg);color:var(--v-text);border:1px solid var(--v-bd);font-weight:700">${E(qType)}</span>`
                    : "";
                const typeInstr = qType && TYPE_INSTRUCTIONS[qType]
                    ? "【문제 유형】" + qType + "\n" + TYPE_INSTRUCTIONS[qType] + "\n\n"
                    : "";

                const block = document.createElement("div");
                block.className = "a4";
                block.innerHTML =
                    `<div class="ph">
                        <div>
                            <div class="ph-title">${E(book)}</div>
                            <div class="ph-sub">${E(parts.join("  ·  "))}${typeHtml}</div>
                        </div>
                        <div class="ph-right">${E(dateStr)}</div>
                    </div>` +
                    LEGEND_HTML +
                    `<div class="pb">
                        <div class="main-text"><div class="load"><div class="spin"></div><div class="load-txt">Claude가 분석 중입니다…</div></div></div>
                        <div class="margin-col"></div>
                    </div>
                    <div class="bottom-section">
                        <div class="bottom-left">
                            <div class="logic-box" style="display:none">
                                <div class="logic-box-title">논리 흐름</div>
                                <div class="lf-chain"></div>
                                <div class="lf-claim"></div>
                            </div>
                            <div class="bg-box" style="display:none">
                                <div class="bg-box-header">배경 지식</div>
                                <div class="bg-box-title"></div>
                                <div class="bg-box-body"></div>
                                <div class="bg-tags"></div>
                            </div>
                            <div class="exam-box" style="display:none">
                                <div class="exam-box-header">내신 출제 유형</div>
                                <div class="exam-items"></div>
                            </div>
                        </div>
                        <div class="qa-box" style="display:none">
                            <div class="qa-header">Q &amp; A</div>
                            <div class="qa-list"></div>
                        </div>
                    </div>`;
                document.getElementById("a4outer").appendChild(block);
                block.dataset.passage = text;
                block.scrollIntoView({ behavior: "smooth", block: "start" });

                const mainEl = block.querySelector(".main-text");
                const mColEl = block.querySelector(".margin-col");
                const lbox = block.querySelector(".logic-box");
                const examBox = block.querySelector(".exam-box");
                const bgBox = block.querySelector(".bg-box");

                try {
                    const userContent = buildUserContent(text, qType, instruction, typeInstr);
                    const res = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 16000,
                            stream: true,
                            system: SYS,
                            messages: [
                                { role: "user", content: userContent },
                            ],
                        }),
                    });
                    const raw = await readAnthropicStream(res);
                    const parsed = repairParseJson(raw);

                    // 문장삽입: answerMarker 기반으로 [삽입] 문장을 올바른 위치로 이동
                    if (qType === "문장삽입" && parsed.answerMarker) {
                        const marker = parsed.answerMarker; // e.g. "④"
                        const insertIdx = parsed.sentences.findIndex(s => s.typeMarker === "[삽입]");
                        // ①②③④⑤ 기호를 포함하는 문장 찾기
                        const afterIdx = parsed.sentences.findIndex(s =>
                            s.text && (s.text.includes(marker) || s.text.includes("(" + marker + ")") || s.text.includes("( " + marker + " )"))
                        );
                        if (insertIdx !== -1 && afterIdx !== -1) {
                            const [ins] = parsed.sentences.splice(insertIdx, 1);
                            // splice 후 afterIdx 재계산 (삽입 문장이 앞에 있었으면 인덱스 하나 감소)
                            const newAfterIdx = parsed.sentences.findIndex(s =>
                                s.text && (s.text.includes(marker) || s.text.includes("(" + marker + ")") || s.text.includes("( " + marker + " )"))
                            );
                            parsed.sentences.splice(newAfterIdx + 1, 0, ins);
                            parsed.sentences.forEach((s, i) => { s.id = i + 1; });
                        }
                    }

                    render(parsed, mainEl, mColEl, examBox, lbox, stat, pBtn, bgBox);
                    saveToCache(book, pageRaw, numRaw, text, parsed);
                } catch (e) {
                    mainEl.innerHTML = '<div class="err">오류: ' + E(e.message) + "</div>";
                    stat.textContent = "오류";
                    console.error(e);
                } finally {
                    btn.disabled = false;
                    btn.textContent = "분석하기 →";
                    document.getElementById("inputText").value = "";
                }
            }

            /* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
            function render(data, mainEl, mColEl, examBox, lbox, stat, pBtn, bgBox) {
                const vocabBySid = {};
                let totalVocab = 0;
                data.sentences.forEach((s) => {
                    vocabBySid[s.id] = s.vocab || [];
                    totalVocab += (s.vocab || []).length;
                });

                let mHtml = "", cHtml = "";
                data.sentences.forEach((s) => {
                    const sv = vocabBySid[s.id] || [];
                    const gr = s.grammar || [];
                    const annotated = annotate(s.text, sv, gr);
                    const chips = gr.length
                        ? '<div class="gc-row">' +
                          gr.map((g) =>
                              '<span class="gc"><span class="gc-lbl">[' + E(g.label) + "]</span> " + E(g.phrase) + " → " + E(g.note) + "</span>"
                          ).join("") + "</div>"
                        : "";
                    let inner;
                    if (s.highlight === "orange") {
                        inner = '<span class="hl-o-block"><span class="tx">' + annotated + "</span></span>";
                    } else {
                        const cls = s.highlight === "yellow" ? " hl-y" : s.highlight === "purple" ? " hl-p" : "";
                        inner = '<span class="tx' + cls + '">' + annotated + "</span>";
                    }
                    const tm = s.typeMarker || null;
                    const tmCls = !tm ? "" : tm === "[X]" ? "tm tm-x" : tm === "[삽입]" ? "tm tm-insert" : tm.match(/^\([A-D가-마]\)$/) ? "tm tm-order" : ["[주제]","[빈칸]","[핵심]"].includes(tm) ? "tm tm-topic" : ["[어법]","[함의]"].includes(tm) ? "tm tm-gram" : "tm tm-gen";
                    const tmHtml = tm ? '<span class="' + tmCls + '">' + E(tm) + "</span>" : "";
                    mHtml +=
                        '<div class="sb" id="sb' + s.id + '"><div class="sr">' +
                        '<span class="sn">' + s.id + "</span>" + tmHtml +
                        '<div class="sw">' + inner + chips +
                        '<div class="tr">' + E(s.translation) + "</div>" +
                        "</div></div></div>";

                    if (s.comment) {
                        const nc = { yellow: "mn-y", orange: "mn-o", purple: "mn-p" }[s.highlight] || "mn-d";
                        cHtml += '<div class="mn ' + nc + '"><span class="mn-ref">[' + s.id + "]</span>" + E(s.comment) + "</div>";
                    }
                });

                mainEl.innerHTML = mHtml;
                mColEl.innerHTML = cHtml || '<div style="font-size:8pt;color:var(--text-3);padding-top:2px">—</div>';

                const flow = data.logicFlow || [];
                const coreClaim = data.coreClaim || "";
                if (flow.length) {
                    const chainHtml = flow.map((step, i) => {
                        const type = step.type || "expansion";
                        const cfg = STEP_TYPES[type] || STEP_TYPES.expansion;
                        const ids = (step.sentenceIds || []).map((n) => "[" + n + "]").join("");
                        const arrow = i < flow.length - 1 ? '<div class="lf-arrow">→</div>' : "";
                        return (
                            '<div class="lf-step">' +
                            '<span class="lf-badge ' + type + '">[' + cfg.label + "]</span>" +
                            '<span class="lf-summary">' + E(step.summary) + "</span>" +
                            (ids ? '<span class="lf-sids">' + ids + "</span>" : "") +
                            "</div>" + arrow
                        );
                    }).join("");
                    lbox.querySelector(".lf-chain").innerHTML = chainHtml;
                    lbox.querySelector(".lf-claim").textContent = "핵심 주장: " + coreClaim;
                    lbox.style.display = "block";
                }

                const examTypes = data.examTypes || [];
                if (examTypes.length) {
                    const itemsHtml = examTypes.map((et) => {
                        const sids = (et.sentenceIds || []).map((n) => "[" + n + "]").join(" ");
                        return (
                            '<div class="exam-item">' +
                            '<span class="exam-badge">' + E(et.type) + "</span>" +
                            '<span class="exam-point">' + E(et.point) +
                            (sids ? '<span class="exam-sids"> ' + sids + "</span>" : "") +
                            "</span></div>"
                        );
                    }).join("");
                    examBox.querySelector(".exam-items").innerHTML = itemsHtml;
                    examBox.style.display = "block";
                }

                const bn = data.backgroundNote;
                if (bgBox && bn && bn.title && bn.body) {
                    bgBox.querySelector(".bg-box-title").textContent = bn.title;
                    bgBox.querySelector(".bg-box-body").textContent = bn.body;
                    const tagsHtml = (bn.tags || []).map(t => '<span class="bg-tag">' + E(t) + "</span>").join("");
                    if (tagsHtml) bgBox.querySelector(".bg-tags").innerHTML = tagsHtml;
                    bgBox.style.display = "block";
                }

                stat.textContent = "✓ " + data.sentences.length + "문장 · 어휘 " + totalVocab + "개";
                pBtn.style.display = "flex";
            }

            /* ════════════════════════════════════════════
   ANNOTATE
════════════════════════════════════════════ */
            function annotate(text, sv, gr) {
                const anns = [];
                gr.forEach((g) => {
                    const i = text.indexOf(g.phrase);
                    if (i === -1) return;
                    anns.push({ s: i, e: i + g.phrase.length, type: "g", d: g });
                });
                sv.forEach((v) => {
                    const safe = v.term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                    const re = new RegExp("(?<![\\w-])" + safe + "(?![\\w-])", "i");
                    const m = text.match(re);
                    if (!m || m.index == null) return;
                    const s = m.index, e = s + m[0].length;
                    if (anns.some((a) => s < a.e && e > a.s)) return;
                    anns.push({ s, e, type: "v", d: v });
                });
                anns.sort((a, b) => a.s - b.s);
                let out = "", pos = 0;
                anns.forEach((a) => {
                    if (a.s < pos) return;
                    out += E(text.slice(pos, a.s));
                    const raw = text.slice(a.s, a.e);
                    if (a.type === "v") {
                        const gloss = a.d.contextMeaning || a.d.meaning || "";
                        out += '<ruby class="vt">' + E(raw) + "<rt>" + E(gloss) + "</rt></ruby>";
                    } else {
                        out += '<span class="gt">' + E(raw) + "</span>";
                    }
                    pos = a.e;
                });
                out += E(text.slice(pos));
                return out;
            }

            function E(s) {
                return String(s || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            document.getElementById("inputText").addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === "Enter") run();
            });
        </script>
