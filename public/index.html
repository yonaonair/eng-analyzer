<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>수능특강 영어 분석기</title>
        <style>
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Thin.woff2") format("woff2"); font-weight:100; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-ExtraLight.woff2") format("woff2"); font-weight:200; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Light.woff2") format("woff2"); font-weight:300; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Medium.woff2") format("woff2"); font-weight:500; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-SemiBold.woff2") format("woff2"); font-weight:600; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-Bold.woff2") format("woff2"); font-weight:700; font-display:swap; }
            @font-face { font-family:"Interop"; src:url("https://raw.githubusercontent.com/payw-org/Interop/main/web/fonts/Interop-ExtraBold.woff2") format("woff2"); font-weight:800; font-display:swap; }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --font:
                    "Interop", "Apple SD Gothic Neo", "Malgun Gothic",
                    sans-serif;
                --bg: #f7f7f5;
                --surface: #ffffff;
                --border: #e4e4df;
                --border-soft: #eeeeea;
                --text: #18181b;
                --text-2: #52525b;
                --text-3: #a1a1aa;
                --accent: #1d4ed8;
                --y-bg: #fefce8;
                --y-bd: #eab308;
                --o-bg: #fff7ed;
                --o-bd: #f97316;
                --p-bg: #f5f3ff;
                --p-bd: #8b5cf6;
                --p-text: #6d28d9;
                --v-bg: #eff6ff;
                --v-bd: #93c5fd;
                --v-text: #1d4ed8;
                --gray-bg: #f4f4f2;
                --gray-bd: #d1d5db;
            }
            body {
                background: var(--bg);
                font-family: var(--font);
                color: var(--text);
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
            }

            /* ── TOP BAR ── */
            .bar {
                position: sticky;
                top: 0;
                z-index: 100;
                background: #fff;
                border-bottom: 1px solid var(--border);
                padding: 0 20px;
                display: flex;
                align-items: center;
                gap: 12px;
                height: 80px;
            }
            .logo {
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 2.8rem;
                line-height: 1.2;
                font-weight: 700;
                letter-spacing: -0.3px;
                white-space: nowrap;
                padding-right: 16px;
                border-right: 1px solid var(--border);
                flex-shrink: 0;
            }
            .logo em {
                font-style: normal;
                color: var(--accent);
            }
            .meta-row {
                display: flex;
                align-items: center;
                gap: 6px;
                padding-right: 12px;
                border-right: 1px solid var(--border);
                flex-shrink: 0;
            }
            .mf {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .ml {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 600;
                color: var(--text-3);
                letter-spacing: 0.4px;
                text-transform: uppercase;
            }
            .mi {
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--bg);
                padding: 6px 10px;
                font-family: var(--font);
                font-size: 2.5rem;
                line-height: 1.35;
                color: var(--text);
                outline: none;
                transition:
                    border-color 0.15s,
                    background 0.15s;
            }
            .mi:focus {
                border-color: var(--accent);
                background: #fff;
            }
            .mi-w {
                width: 160px;
            }
            .mi-s {
                width: 80px;
            }
            .ta-wrap {
                flex: 1;
                padding: 6px 0;
                min-width: 0;
            }
            .ta {
                width: 100%;
                height: 60px;
                resize: none;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--bg);
                padding: 10px 16px;
                font-family: var(--font);
                font-size: 2.5rem;
                line-height: 1.35;
                color: var(--text);
                outline: none;
                transition:
                    border-color 0.15s,
                    background 0.15s;
            }
            .ta::placeholder {
                color: var(--text-3);
            }
            .ta:focus {
                border-color: var(--accent);
                background: #fff;
            }
            .actions {
                display: flex;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }
            .stat {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-3);
                white-space: nowrap;
            }
            .btn {
                height: 52px;
                padding: 0 20px;
                border: none;
                border-radius: 8px;
                font-family: var(--font);
                font-size: 2.5rem;
                line-height: 1.35;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
                white-space: nowrap;
                transition: all 0.15s;
            }
            .btn-main {
                background: var(--accent);
                color: #fff;
            }
            .btn-main:hover {
                background: #1e40af;
                box-shadow: 0 4px 14px rgba(29, 78, 216, 0.3);
                transform: translateY(-1px);
            }
            .btn-main:active {
                transform: translateY(0);
            }
            .btn-main:disabled {
                background: #cbd5e1;
                cursor: not-allowed;
                box-shadow: none;
                transform: none;
            }
            .btn-ghost {
                background: #fff;
                color: var(--text-2);
                border: 1px solid var(--border);
                font-size: 2.5rem;
                line-height: 1.35;
            }
            .btn-ghost:hover {
                border-color: var(--text-2);
            }

            /* ── EMPTY ── */
            .empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 100px 32px;
                color: var(--text-3);
                text-align: center;
            }
            .empty-icon {
                font-size: clamp(3.2rem, 5vw, 5.2rem);
                line-height: 1.05;
                margin-bottom: 20px;
            }
            .empty-title {
                font-size: 2.8rem;
                line-height: 1.2;
                font-weight: 600;
                color: var(--text-2);
                margin-bottom: 8px;
            }
            .empty-desc {
                font-size: 2.5rem;
                line-height: 1.35;
            }

            /* ── A4 ── */
            .a4-outer {
                display: none;
                padding: 32px 24px 80px;
            }
            .a4 {
                width: 210mm;
                min-height: 297mm;
                background: #fff;
                margin: 0 auto;
                padding: 14mm 10mm 16mm 16mm;
                box-shadow:
                    0 1px 4px rgba(0, 0, 0, 0.05),
                    0 8px 32px rgba(0, 0, 0, 0.1);
                border-radius: 3px;
            }

            /* PAGE HEADER */
            .ph {
                border-bottom: 2px solid var(--text);
                padding-bottom: 3.5mm;
                margin-bottom: 4.5mm;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
            .ph-title {
                font-size: clamp(3.2rem, 5vw, 5.2rem);
                font-weight: 800;
                letter-spacing: -0.5px;
                line-height: 1.05;
            }
            .ph-sub {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-2);
                margin-top: 4px;
                font-weight: 400;
            }
            .ph-right {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-3);
                text-align: right;
            }

            /* LEGEND */
            .legend {
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                margin-bottom: 4.5mm;
                padding: 2.5mm 4mm;
                background: #fafaf8;
                border: 1px solid var(--border-soft);
                border-radius: 5px;
            }
            .li {
                display: flex;
                align-items: center;
                gap: 5px;
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-2);
            }
            .lchip {
                height: 20px;
                border-radius: 2px;
                flex-shrink: 0;
            }
            .lvchip {
                background: var(--v-bg);
                border: 1px solid var(--v-bd);
                color: var(--v-text);
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 700;
                padding: 0 6px;
                border-radius: 3px;
                height: 28px;
                display: inline-flex;
                align-items: center;
            }

            /* PAGE BODY GRID */
            .pb {
                display: grid;
                grid-template-columns: 1fr 44mm;
                gap: 7mm;
            }

            /* SENTENCES */
            .sb {
                margin-bottom: 3.5mm;
            }
            .sr {
                display: flex;
                gap: 5px;
                align-items: baseline;
            }
            .sn {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-3);
                font-weight: 600;
                flex-shrink: 0;
                width: 28px;
                padding-top: 2px;
                font-variant-numeric: tabular-nums;
            }
            .sw {
                flex: 1;
            }
            .tx {
                font-size: 2.8rem;
                line-height: 2.2;
                color: var(--text);
                font-weight: 400;
                letter-spacing: 0.01em;
                text-align: justify;
                overflow-wrap: break-word;
                word-break: normal;
            }

            /* RUBY VOCAB ANNOTATIONS */
            ruby {
                ruby-align: center;
            }
            rt {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 700;
                color: var(--v-text);
                white-space: nowrap;
                letter-spacing: 0;
            }
            ruby.vt {
                color: var(--v-text);
                font-weight: 600;
            }
            .hl-y {
                background: var(--y-bg);
                padding: 1px 3px;
                border-radius: 2px;
                box-decoration-break: clone;
                -webkit-box-decoration-break: clone;
            }
            .hl-p {
                background: var(--p-bg);
                padding: 1px 3px;
                border-radius: 2px;
                box-decoration-break: clone;
                -webkit-box-decoration-break: clone;
            }
            .hl-o-block {
                display: block;
                background: var(--o-bg);
                border-left: 3px solid var(--o-bd);
                padding: 3px 7px 3px 8px;
                border-radius: 0 4px 4px 0;
                margin-bottom: 1px;
            }
            .vt {
                color: var(--v-text);
                font-weight: 600;
            }
            .vn {
                display: inline-block;
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 700;
                color: var(--v-text);
                background: var(--v-bg);
                border: 1px solid var(--v-bd);
                border-radius: 3px;
                padding: 0 4px;
                margin-left: 2px;
                vertical-align: super;
                cursor: pointer;
                transition:
                    background 0.12s,
                    color 0.12s;
                white-space: nowrap;
                user-select: none;
            }
            .vn:hover {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .gt {
                color: var(--p-text);
                font-weight: 600;
                border-bottom: 2px solid #c4b5fd;
            }
            .gc-row {
                display: flex;
                flex-direction: column;
                gap: 2px;
                margin-top: 3px;
            }
            .gc {
                font-size: 2.2rem;
                line-height: 1.4;
                color: #1e1b4b;
                background: var(--p-bg);
                border: 1px solid #ddd6fe;
                border-left: 3px solid var(--p-bd);
                border-radius: 0 3px 3px 0;
                padding: 3px 10px;
                font-weight: 400;
            }
            .gc-lbl {
                color: var(--p-text);
                font-weight: 800;
            }
            .tr {
                font-size: 2.5rem;
                line-height: 1.35;
                color: var(--text-2);
                margin-top: 6px;
                font-weight: 300;
                letter-spacing: -0.1px;
            }

            /* MARGIN NOTES */
            .mn {
                font-size: 2.2rem;
                line-height: 1.4;
                padding: 6px 9px;
                border-radius: 4px;
                margin-bottom: 3mm;
                font-weight: 400;
            }
            .mn-y {
                background: var(--y-bg);
                border-left: 2.5px solid var(--y-bd);
                color: #713f12;
            }
            .mn-o {
                background: var(--o-bg);
                border-left: 2.5px solid var(--o-bd);
                color: #7c2d12;
            }
            .mn-p {
                background: var(--p-bg);
                border-left: 2.5px solid var(--p-bd);
                color: #4c1d95;
            }
            .mn-d {
                background: var(--gray-bg);
                border-left: 2.5px solid var(--gray-bd);
                color: var(--text-2);
            }
            .mn-ref {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 700;
                opacity: 0.6;
                display: block;
                margin-bottom: 3px;
            }

            /* ══════════════════════════════════════
   LOGIC FLOW BOX — 핵심 개선 영역
══════════════════════════════════════ */
            /* BOTTOM SECTION — 논리흐름+내신(좌) / Q&A(우) */
            .bottom-section {
                display: grid;
                grid-template-columns: 1fr 72mm;
                gap: 6mm;
                margin-top: 5mm;
            }
            .bottom-left {
                display: flex;
                flex-direction: column;
                gap: 4mm;
            }

            .logic-box {
                background: var(--gray-bg);
                border: 1px solid var(--gray-bd);
                border-radius: 7px;
                padding: 4mm 5mm 5mm;
            }

            .logic-box-title {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                color: var(--text-3);
                letter-spacing: 0.7px;
                text-transform: uppercase;
                margin-bottom: 3mm;
            }

            /* TEXT CHAIN — 논리 흐름 */
            .lf-chain {
                display: flex;
                flex-direction: column;
                gap: 0;
            }
            .lf-step {
                display: flex;
                align-items: baseline;
                gap: 6px;
                padding: 1.5px 0;
            }
            .lf-badge {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                white-space: nowrap;
                flex-shrink: 0;
                padding: 2px 7px;
                border-radius: 3px;
            }
            .lf-badge.premise  { color: #374151; background: #f3f4f6; }
            .lf-badge.claim    { color: #1d4ed8; background: #eff6ff; }
            .lf-badge.problem  { color: #92400e; background: #fffbeb; }
            .lf-badge.counter  { color: #5b21b6; background: #f5f3ff; }
            .lf-badge.evidence { color: #065f46; background: #ecfdf5; }
            .lf-badge.concession{ color: #9f1239; background: #fff1f2; }
            .lf-badge.conclusion{ color: #1e40af; background: #dbeafe; }
            .lf-badge.example  { color: #0e7490; background: #ecfeff; }
            .lf-badge.expansion{ color: #52525b; background: #f4f4f5; }
            .lf-summary {
                font-size: 2.2rem;
                line-height: 1.4;
                color: var(--text);
                word-break: keep-all;
            }
            .lf-sids {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-3);
                white-space: nowrap;
                flex-shrink: 0;
            }
            .lf-arrow {
                font-size: 2rem;
                line-height: 1.45;
                color: var(--text-3);
                padding-left: 6px;
            }
            .lf-claim {
                margin-top: 2.5mm;
                padding-top: 2.5mm;
                border-top: 1px solid var(--border-soft);
                font-size: 2.2rem;
                line-height: 1.4;
                font-weight: 700;
                color: var(--text-2);
            }

            /* VOCAB TABLE */
            .vs {
                grid-column: 1 / -1;
                margin-top: 6mm;
                border-top: 1.5px solid var(--border);
                padding-top: 4mm;
            }
            .vs-ttl {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                color: var(--text-2);
                letter-spacing: 0.8px;
                text-transform: uppercase;
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 3mm;
            }
            .vs-ttl::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border-soft);
            }
            .vt-table {
                width: 100%;
                border-collapse: collapse;
            }
            .vt-table th {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 600;
                color: var(--text-3);
                text-align: left;
                padding: 4px 8px;
                border-bottom: 1px solid var(--border);
                letter-spacing: 0.3px;
                text-transform: uppercase;
                background: #fafaf8;
            }
            .vt-table td {
                font-size: 2.2rem;
                line-height: 1.4;
                padding: 5px 8px;
                vertical-align: top;
                border-bottom: 1px solid var(--border-soft);
            }
            .vt-table tr:last-child td {
                border-bottom: none;
            }
            .vt-table tr:hover td {
                background: #f8fbff;
            }
            .vt-n {
                color: var(--v-text);
                font-weight: 800;
                font-size: 2rem;
                line-height: 1.45;
                width: 30px;
                text-align: center;
            }
            .vt-w {
                font-weight: 700;
                color: var(--v-text);
                width: 120px;
            }
            .vt-p {
                color: var(--text-3);
                font-size: 2rem;
                line-height: 1.45;
                font-style: italic;
                white-space: nowrap;
                width: 80px;
            }
            .vt-m {
                color: var(--text);
            }
            .vt-c {
                color: #ea580c;
                font-size: 2.2rem;
                line-height: 1.4;
                font-weight: 600;
                width: 200px;
            }

            /* EXAM TYPE BOX */
            .exam-box {
                background: #f0fdf4;
                border: 1px solid #86efac;
                border-left: 4px solid #22c55e;
                border-radius: 7px;
                padding: 4mm 5mm 5mm;
            }
            .exam-box-header {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                color: #166534;
                letter-spacing: 0.7px;
                text-transform: uppercase;
                margin-bottom: 3mm;
            }
            .exam-items {
                display: flex;
                flex-direction: column;
                gap: 2mm;
            }
            .exam-item {
                display: flex;
                gap: 7px;
                align-items: baseline;
            }
            .exam-badge {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                color: #fff;
                background: #16a34a;
                border-radius: 3px;
                padding: 2px 8px;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .exam-point {
                font-size: 2.2rem;
                line-height: 1.4;
                color: #14532d;
            }
            .exam-sids {
                font-size: 2rem;
                line-height: 1.45;
                color: #4ade80;
                font-weight: 700;
                margin-left: 4px;
            }

            /* Q&A BOX */
            .qa-box {
                background: #f8fafc;
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 4mm 5mm 5mm;
                display: flex;
                flex-direction: column;
            }
            .qa-header {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 800;
                color: var(--text-3);
                letter-spacing: 0.7px;
                text-transform: uppercase;
                margin-bottom: 3mm;
            }
            .qa-list {
                display: flex;
                flex-direction: column;
                gap: 4mm;
                flex: 1;
            }
            .qa-item {
                border-left: 3px solid var(--accent);
                padding-left: 7px;
            }
            .qa-q {
                font-size: 2rem;
                line-height: 1.45;
                font-weight: 700;
                color: var(--accent);
                margin-bottom: 4px;
            }
            .qa-a {
                font-size: 2.2rem;
                line-height: 1.4;
                color: var(--text);
                white-space: pre-wrap;
            }
            .qa-loading {
                color: var(--text-3);
                font-style: italic;
            }

            /* LOADING / ERROR */
            .load {
                padding: 60px 0;
                text-align: center;
                color: var(--text-3);
            }
            .spin {
                width: 24px;
                height: 24px;
                border: 2px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: sp 0.75s linear infinite;
                margin: 0 auto 12px;
            }
            @keyframes sp {
                to {
                    transform: rotate(360deg);
                }
            }
            .load-txt {
                font-size: 2.2rem;
                line-height: 1.4;
            }
            .err {
                background: #fff1f2;
                border: 1px solid #fecdd3;
                border-radius: 6px;
                padding: 16px 20px;
                color: #9f1239;
                font-size: 2.2rem;
                line-height: 1.4;
            }

            /* BLOCK SEPARATOR */
            .a4 + .a4 {
                margin-top: 28px;
                border-top: 2px dashed var(--border);
                padding-top: 28px;
            }

            /* PRINT */
            @media print {
                .a4 + .a4 {

        <script>
            /* ════════════════════════════════════════════
   DB — /api/db 를 통해 Neon PostgreSQL 연동
   (로컬: server.js, 배포: netlify/functions/db.js)
════════════════════════════════════════════ */
            async function dbCall(payload) {
                const res = await fetch("/api/db", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { throw new Error("DB 응답 오류 (HTML 수신) — DATABASE_URL이 .env에 있는지 확인하세요."); }
                if (data && data.error) throw new Error(data.error);
                return data;
            }

            async function checkCache(book, page, num) {
                if (!num) return null;
                try {
                    return await dbCall({ action: "check", book, page: page || "", num });
                } catch { return null; }
            }

            async function saveToCache(book, page, num, passage, result) {
                if (!num) return;
                try {
                    await dbCall({ action: "upsert", book, page: page || "", num, passage, result });
                } catch (e) { console.warn("캐시 저장 실패:", e.message); }
            }

            /* ── HISTORY MODAL ── */
            let _historyAll = [];

            async function openHistory() {
                document.getElementById("historyOverlay").classList.add("open");
                document.getElementById("historySearch").value = "";
                document.getElementById("historyList").innerHTML = '<div class="modal-empty">불러오는 중…</div>';
                try {
                    _historyAll = await dbCall({ action: "list" });
                    renderHistoryList(_historyAll);
                } catch (e) {
                    document.getElementById("historyList").innerHTML =
                        '<div class="modal-empty">오류: ' + E(e.message) + '</div>';
                }
            }

            function closeHistory(e) {
                if (e && e.target !== document.getElementById("historyOverlay")) return;
                document.getElementById("historyOverlay").classList.remove("open");
            }

            function filterHistory() {
                const q = document.getElementById("historySearch").value.toLowerCase();
                renderHistoryList(!q ? _historyAll : _historyAll.filter(r =>
                    (r.book || "").toLowerCase().includes(q) ||
                    (r.page || "").includes(q) ||
                    (r.num || "").includes(q)
                ));
            }

            function renderHistoryList(rows) {
                document.getElementById("historyCount").textContent = rows.length + "건";
                const el = document.getElementById("historyList");
                if (!rows.length) {
                    el.innerHTML = '<div class="modal-empty">저장된 분석이 없습니다</div>';
                    return;
                }
                el.innerHTML = rows.map(r => {
                    const date = new Date(r.created_at).toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
                    const badge = [r.page ? "p." + r.page : "", r.num ? r.num + "번" : ""].filter(Boolean).join(" · ");
                    return `<div class="modal-row" id="mrow-${r.id}" onclick="loadCachedById('${r.id}')">
                        <span class="modal-row-book">${E(r.book || "—")}</span>
                        ${badge ? `<span class="modal-row-badge">${E(badge)}</span>` : ""}
                        <span class="modal-row-meta">${date}</span>
                        <span class="modal-row-actions" onclick="event.stopPropagation()">
                            <button class="mra-btn" title="이름 수정" onclick="startEditRow('${r.id}','${E(r.book||"")}','${E(r.page||"")}','${E(r.num||"")}')">✎</button>
                            <button class="mra-btn del" title="삭제" onclick="deleteAnalysis('${r.id}')">✕</button>
                        </span>
                    </div>`;
                }).join("");
            }

            async function deleteAnalysis(id) {
                if (!confirm("이 분석을 삭제하시겠습니까?")) return;
                try {
                    await dbCall({ action: "delete", id });
                    _historyAll = _historyAll.filter(r => r.id !== id);
                    renderHistoryList(_historyAll);
                } catch (e) { alert("삭제 실패: " + e.message); }
            }

            function startEditRow(id, book, page, num) {
                const row = document.getElementById("mrow-" + id);
                if (!row) return;
                row.classList.add("editing");
                row.onclick = null;
                row.innerHTML = `
                    <div class="mre-inputs">
                        <input class="mre-input mre-book" value="${E(book)}" placeholder="교재명" id="mre-book-${id}">
                        <input class="mre-input mre-sm" value="${E(page)}" placeholder="쪽" id="mre-page-${id}">
                        <input class="mre-input mre-sm" value="${E(num)}" placeholder="번호" id="mre-num-${id}">
                    </div>
                    <div class="mre-actions">
                        <button class="mre-save" onclick="saveEditRow('${id}')">저장</button>
                        <button class="mre-cancel" onclick="cancelEditRow('${id}')">취소</button>
                    </div>`;
                document.getElementById("mre-book-" + id).focus();
            }

            function cancelEditRow(id) {
                renderHistoryList(_historyAll);
            }

            async function saveEditRow(id) {
                const book = document.getElementById("mre-book-" + id).value.trim();
                const page = document.getElementById("mre-page-" + id).value.trim();
                const num  = document.getElementById("mre-num-" + id).value.trim();
                if (!book) { alert("교재명을 입력하세요."); return; }
                try {
                    await dbCall({ action: "update", id, book, page, num });
                    const r = _historyAll.find(r => r.id === id);
                    if (r) { r.book = book; r.page = page; r.num = num; }
                    renderHistoryList(_historyAll);
                } catch (e) { alert("수정 실패: " + e.message); }
            }

            async function loadCachedById(id) {
                document.getElementById("historyOverlay").classList.remove("open");
                try {
                    const data = await dbCall({ action: "get", id });
                    if (!data) { alert("불러오기 실패"); return; }
                    document.getElementById("mBook").value = data.book || "";
                    document.getElementById("mPage").value = data.page || "";
                    document.getElementById("mNum").value = data.num || "";
                    await loadFromCache(data);
                } catch (e) { alert("불러오기 실패: " + e.message); }
            }

            async function loadFromCache(cached) {
                const btn = document.getElementById("analyzeBtn");
                const stat = document.getElementById("stat");
                const pBtn = document.getElementById("printBtn");
                const book = cached.book || "";
                const pageRaw = cached.page || "";
                const numRaw = cached.num || "";
                const parts = [];
                if (pageRaw) parts.push("p. " + pageRaw);
                if (numRaw) parts.push(numRaw + "번");
                const dateStr = new Date(cached.created_at || Date.now()).toLocaleDateString("ko-KR", {
                    year: "numeric", month: "long", day: "numeric"
                });

                btn.disabled = true; btn.textContent = "불러오는 중…";
                document.getElementById("emptyState").style.display = "none";
                document.getElementById("a4outer").style.display = "block";
                stat.textContent = "";

                const block = document.createElement("div");
                block.className = "a4";
                block.innerHTML =
                    `<div class="ph">
                        <div>
                            <div class="ph-title">${E(book)}</div>
                            <div class="ph-sub">${E(parts.join("  ·  "))}<span class="cache-badge">⚡ 저장됨</span></div>
                        </div>
                        <div class="ph-right">${E(dateStr)}</div>
                    </div>` + LEGEND_HTML +
                    `<div class="pb">
                        <div class="main-text"></div>
                        <div class="margin-col"></div>
                    </div>
                    <div class="bottom-section">
                        <div class="bottom-left">
                            <div class="logic-box" style="display:none">
                                <div class="logic-box-title">논리 흐름</div>
                                <div class="lf-chain"></div>
                                <div class="lf-claim"></div>
                            </div>
                            <div class="exam-box" style="display:none">
                                <div class="exam-box-header">내신 출제 유형</div>
                                <div class="exam-items"></div>
                            </div>
                        </div>
                        <div class="qa-box" style="display:none">
                            <div class="qa-header">Q &amp; A</div>
                            <div class="qa-list"></div>
                        </div>
                    </div>`;
                document.getElementById("a4outer").appendChild(block);
                block.dataset.passage = cached.passage || "";
                block.scrollIntoView({ behavior: "smooth", block: "start" });

                const mainEl = block.querySelector(".main-text");
                const mColEl = block.querySelector(".margin-col");
                const lbox = block.querySelector(".logic-box");
                const examBox = block.querySelector(".exam-box");
                render(cached.result, mainEl, mColEl, examBox, lbox, stat, pBtn);

                btn.disabled = false; btn.textContent = "분석하기 →";
                document.getElementById("inputText").value = "";
            }

            /* ════════════════════════════════════════════
   STEP TYPE CONFIG
════════════════════════════════════════════ */
            const STEP_TYPES = {
                premise: { label: "통념/배경", color: "#9CA3AF" },

            /* ════════════════════════════════════════════

════════════════════════════════════════════ */
            const SYS = `You are a 수능 English expert preparing study materials for 외고 3학년 students.
Return ONLY a raw JSON object. No markdown fences, no explanation, absolutely nothing else.

=== VOCABULARY — ANNOTATE AGGRESSIVELY ===

6. Common but important verbs: ensure, maintain, provide, require, suggest, indicate, demonstrate, reveal, establish, identify, achieve, enable, involve, consist, vary, affect, reflect, determine, influence, develop, represent, occur, appear, tend, allow, prevent, reduce, increase, improve, describe, explain, argue, claim, consider, define, examine, analyze, apply, compare, produce, create, perform, carry, bring, refer, relate, apply, respond, adjust, adapt, modify, combine, distinguish, recognize, observe, evaluate, measure, assess.
7. When in doubt — include it. More is better. Aim for 6–15 vocab items per sentence.

=== GRAMMAR ===

            /* ════════════════════════════════════════════
   STREAMING HELPER
════════════════════════════════════════════ */
            async function readAnthropicStream(res) {
                if (!res.ok) {
                    const t = await res.text();
                    try { const e = JSON.parse(t); throw new Error(e.error?.message || `API 오류 ${res.status}`); }
                    catch (e) { if (e.message !== "Unexpected token") throw e; throw new Error(`서버 오류 (${res.status})`); }
                }
                const ct = res.headers.get("content-type") || "";
                if (!ct.includes("event-stream")) {
                    // 비스트리밍 fallback
                    const json = await res.json();
                    if (json.error) throw new Error(json.error.message);
                    return (json.content?.find(b => b.type === "text") || {}).text || "";
                }
                const reader = res.body.getReader();
                const dec = new TextDecoder();
                let text = "", buf = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split("\n");
                    buf = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const d = line.slice(6).trim();
                        if (d === "[DONE]") break;
                        try {
                            const ev = JSON.parse(d);
                            if (ev.type === "content_block_delta" && ev.delta?.type === "text_delta") text += ev.delta.text;
                            else if (ev.type === "error") throw new Error(ev.error?.message || "스트리밍 오류");
                        } catch (e) { if (e.message !== "Unexpected token" && !e.message.startsWith("JSON")) throw e; }
                    }
                }
                return text;
            }

            /* ════════════════════════════════════════════
   JSON REPAIR
════════════════════════════════════════════ */
            function repairParseJson(raw) {
                // 1차: 그대로 파싱
                try { return JSON.parse(raw); } catch {}

                // JSON 객체 추출
                const m = raw.match(/\{[\s\S]*\}/);
                if (!m) throw new Error("응답에서 JSON을 찾을 수 없습니다.");
                let s = m[0];

                // 문자열 내 제어문자 처리
                s = s.replace(/("(?:[^"\\]|\\.)*")/g, str =>
                    str.replace(/[\n\r\t\u2028\u2029]/g, c =>
                        ({ "\n": " ", "\r": "", "\t": " ", "\u2028": " ", "\u2029": " " }[c] ?? " ")
                    )
                );

                // 배열 원소 간 누락 쉼표 보완 (여러 패턴, 최대 30회)
                const patterns = [
                    [/\}(\s*)\{/g, "},$1{"],
                    [/\](\s*)\[/g, "],$1["],
                    [/\](\s*)\{/g, "],$1{"],
                    [/\}(\s*)\[/g, "},$1["],
                ];
                for (let i = 0; i < 30; i++) {
                    const prev = s;
                    patterns.forEach(([re, rep]) => { s = s.replace(re, rep); });
                    s = s.replace(/,(\s*[}\]])/g, "$1");
                    if (s === prev) break;
                }

                // 에러 위치를 읽어서 쉼표 직접 삽입 (최대 10회)
                for (let i = 0; i < 10; i++) {
                    try { return JSON.parse(s); } catch (e) {
                        const pos = parseInt((e.message.match(/position (\d+)/) || [])[1]);
                        if (!pos || pos <= 0 || pos >= s.length) break;
                        s = s.slice(0, pos) + "," + s.slice(pos);
                    }
                }

                return JSON.parse(s); // 최종 시도, 실패 시 throw
            }

            async function run() {

                // (요청사항) 첫 줄에서 지시사항 추출
                let instruction = null;
                let body = raw;
                const instrMatch = raw.match(/^\(([^)]+)\)\s*\n/);
                if (instrMatch) {
                    instruction = instrMatch[1].trim();
                    body = raw.slice(instrMatch[0].length).trim();
                }

                // # 으로 시작하는 줄이 있으면 Q&A 모드
                const lines = body.split("\n");
                const hashIdx = lines.findIndex((l) => l.trimStart().startsWith("#"));
                if (hashIdx !== -1) {
                    const question = lines.slice(hashIdx).join("\n").trimStart().slice(1).trim();
                    const inlinePassage = lines.slice(0, hashIdx).join("\n").trim();
                    await runQA(question, inlinePassage);
                } else {

                    if (num) {

                        if (cached) { await loadFromCache(cached); return; }
                    }
                    await runAnalysis(body, instruction);
                }

            function render(data, mainEl, mColEl, examBox, lbox, stat, pBtn) {
                // Build per-sentence vocab maps (no global index needed)
                const vocabBySid = {};
                let totalVocab = 0;
                data.sentences.forEach((s) => {
                    vocabBySid[s.id] = s.vocab || [];
                    totalVocab += (s.vocab || []).length;
                });

                // Sentences
                let mHtml = "",
                    cHtml = "";
                data.sentences.forEach((s) => {
                    const sv = vocabBySid[s.id] || [];
                    const gr = s.grammar || [];
                    const annotated = annotate(s.text, sv, gr);
                    const chips = gr.length
                        ? '<div class="gc-row">' +
                          gr
                              .map(
                                  (g) =>
                                      '<span class="gc"><span class="gc-lbl">[' +
                                      E(g.label) +
                                      "]</span> " +
                                      E(g.phrase) +
                                      " → " +
                                      E(g.note) +
                                      "</span>",
                              )
                              .join("") +
                          "</div>"
                        : "";
                    let inner;
                    if (s.highlight === "orange") {
                        inner =
                            '<span class="hl-o-block"><span class="tx">' +
                            annotated +
                            "</span></span>";
                    } else {
                        const cls =
                            s.highlight === "yellow"
                                ? " hl-y"
                                : s.highlight === "purple"
                                  ? " hl-p"
                                  : "";
                        inner =
                            '<span class="tx' +
                            cls +
                            '">' +
                            annotated +
                            "</span>";
                    }
                    mHtml +=
                        '<div class="sb" id="sb' +
                        s.id +
                        '"><div class="sr">' +
                        '<span class="sn">' +
                        s.id +
                        "</span>" +
                        '<div class="sw">' +
                        inner +
                        chips +
                        '<div class="tr">' +
                        E(s.translation) +
                        "</div>" +
                        "</div></div></div>";

                    if (s.comment) {
                        const nc =
                            { yellow: "mn-y", orange: "mn-o", purple: "mn-p" }[
                                s.highlight
                            ] || "mn-d";
                        cHtml +=
                            '<div class="mn ' +
                            nc +
                            '"><span class="mn-ref">[' +
                            s.id +
                            "]</span>" +
                            E(s.comment) +
                            "</div>";
                    }
                });

                mainEl.innerHTML = mHtml;
                mColEl.innerHTML =
                    cHtml ||
                    '<div style="font-size:8pt;color:var(--text-3);padding-top:2px">—</div>';

                // ── LOGIC FLOW BOX ──
                const flow = data.logicFlow || [];
                const coreClaim = data.coreClaim || "";

                if (flow.length) {
                    const chainHtml = flow
                        .map((step, i) => {
                            const type = step.type || "expansion";
                            const cfg =
                                STEP_TYPES[type] || STEP_TYPES.expansion;
                            const ids = (step.sentenceIds || [])
                                .map((n) => "[" + n + "]")
                                .join("");
                            const arrow =
                                i < flow.length - 1
                                    ? '<div class="lf-arrow">→</div>'
                                    : "";
                            return (
                                '<div class="lf-step">' +
                                '<span class="lf-badge ' +
                                type +
                                '">[' +
                                cfg.label +
                                "]</span>" +
                                '<span class="lf-summary">' +
                                E(step.summary) +
                                "</span>" +
                                (ids
                                    ? '<span class="lf-sids">' +
                                      ids +
                                      "</span>"
                                    : "") +
                                "</div>" +
                                arrow
                            );
                        })
                        .join("");

                    lbox.querySelector(".lf-chain").innerHTML = chainHtml;
                    lbox.querySelector(".lf-claim").textContent =
                        "핵심 주장: " + coreClaim;
                    lbox.style.display = "block";
                }

                // ── EXAM TYPE BOX ──
                const examTypes = data.examTypes || [];
                if (examTypes.length) {
                    const itemsHtml = examTypes
                        .map((et) => {
                            const sids = (et.sentenceIds || [])
                                .map((n) => "[" + n + "]")
                                .join(" ");
                            return (
                                '<div class="exam-item">' +
                                '<span class="exam-badge">' +
                                E(et.type) +
                                "</span>" +
                                '<span class="exam-point">' +
                                E(et.point) +
                                (sids
                                    ? '<span class="exam-sids"> ' +
                                      sids +
                                      "</span>"
                                    : "") +
                                "</span>" +
                                "</div>"
                            );
                        })
                        .join("");
                    examBox.querySelector(".exam-items").innerHTML = itemsHtml;
                    examBox.style.display = "block";
                }

                stat.textContent =
                    "✓ " +
                    data.sentences.length +
                    "문장 · 어휘 " +
                    totalVocab +
                    "개";
                pBtn.style.display = "flex";
            }

            /* ════════════════════════════════════════════
   ANNOTATE
════════════════════════════════════════════ */
            function annotate(text, sv, gr) {
                const anns = [];
                gr.forEach((g) => {
                    const i = text.indexOf(g.phrase);
                    if (i === -1) return;
                    anns.push({
                        s: i,
                        e: i + g.phrase.length,
                        type: "g",
                        d: g,
                    });
                });
                sv.forEach((v) => {
                    const safe = v.term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                    const re = new RegExp(
                        "(?<![\\w-])" + safe + "(?![\\w-])",
                        "i",
                    );
                    const m = text.match(re);
                    if (!m || m.index == null) return;
                    const s = m.index,
                        e = s + m[0].length;
                    if (anns.some((a) => s < a.e && e > a.s)) return;
                    anns.push({ s, e, type: "v", d: v });
                });
                anns.sort((a, b) => a.s - b.s);
                let out = "",
                    pos = 0;
                anns.forEach((a) => {
                    if (a.s < pos) return;
                    out += E(text.slice(pos, a.s));
                    const raw = text.slice(a.s, a.e);
                    if (a.type === "v") {
                        const gloss = a.d.contextMeaning || a.d.meaning || "";
                        out +=
                            '<ruby class="vt">' +
                            E(raw) +
                            "<rt>" +
                            E(gloss) +
                            "</rt></ruby>";
                    } else {
                        out += '<span class="gt">' + E(raw) + "</span>";
                    }
                    pos = a.e;
                });
                out += E(text.slice(pos));
                return out;
            }

            function E(s) {
                return String(s || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            document
                .getElementById("inputText")
                .addEventListener("keydown", (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") run();
                });
        </script>
    </body>
</html>
